services:
  bot:
    build: .
    container_name: nh_starlightsecurity
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - GUILD_ID=${GUILD_ID}
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nh-starlight-network

  db:
    image: postgres:15-alpine
    container_name: nh_starlightsecurity-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-nh_starlightsecurity}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-nh_starlightsecurity}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nh-starlight-network

networks:
  nh-starlight-network:
    driver: bridge

volumes:
  postgres_data:
